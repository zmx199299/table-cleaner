name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            npm_script: linux
            artifact_name: 表格自动化清理工具-${{ github.ref_name }}.AppImage
            extra_name: 表格自动化清理工具-${{ github.ref_name }}.deb
          - os: windows-latest
            platform: windows
            npm_script: win
            artifact_name: 表格自动化清理工具-${{ github.ref_name }}-setup.exe
          - os: macos-latest
            platform: mac
            npm_script: mac
            artifact_name: 表格自动化清理工具-${{ github.ref_name }}.dmg

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Install Python
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            sudo apt-get update
            sudo apt-get install -y python3 python3-pip python3-venv
          elif [ "$RUNNER_OS" == "macOS" ]; then
            brew install python@3.10
          fi
        shell: bash

      - name: Setup Python Virtual Environment
        run: |
          python3 -m venv venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          pip install --upgrade pip
          pip install -r requirements.txt
        shell: bash

      - name: Build application
        run: npm run build:${{ matrix.npm_script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: dist/*.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: false
          body: |
            ## 表格自动化清理工具 v${{ github.ref_name }}
            
            ### 安装包下载
            
            - Windows: 下载 .exe 文件
            - macOS: 下载 .dmg 文件
            - Linux: 下载 .AppImage 或 .deb 文件
            
            ### 更新内容
            见 [CHANGELOG](https://github.com/zmx199299/table-cleaner/blob/master/CHANGELOG.md)
            
            ---
            * Developed by zmx199299 with CodeBuddy-CN *
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
